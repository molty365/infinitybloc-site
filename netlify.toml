[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/bp.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/chains.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/team"
  to = "/team.html"
  status = 200

[[redirects]]
  from = "/code-of-conduct"
  to = "/code-of-conduct.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
