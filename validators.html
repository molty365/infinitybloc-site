<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telos BP Validator · infinitybloc</title>
  <!-- Chart.js only — no date adapter needed (we format timestamps ourselves) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --blue:    #58a6ff;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .meta { color: var(--muted); font-size: 12px; margin-left: auto; }

    .stats {
      display: flex;
      gap: 28px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat .value { font-size: 20px; font-weight: 600; }
    .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    .green { color: var(--green) !important; }
    .red   { color: var(--red)   !important; }
    .blue  { color: var(--blue)  !important; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--surface);
    }
    .tab {
      padding: 10px 18px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Performance panel ── */
    .perf-panel { padding: 24px; }
    .perf-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .perf-title { font-size: 15px; font-weight: 600; flex: 1; text-align: center; }
    .btn {
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #30363d; }
    .btn.primary { background: #1f6feb; border-color: #1f6feb; }
    .btn.primary:hover { background: #388bfd; }

    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 20px 14px;
    }
    .chart-canvas-wrap { position: relative; height: 440px; }

    .bp-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
      transition: opacity .15s;
    }
    .legend-item.hidden { opacity: .28; }
    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .notice {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    /* ── Table panel ── */
    .controls {
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    input[type=search] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 13px;
      width: 210px;
      outline: none;
    }
    input[type=search]:focus { border-color: var(--blue); }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .filter-btn.active { color: var(--text); border-color: var(--blue); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th.sorted { color: var(--blue); }
    td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      white-space: nowrap;
    }
    tr:hover td { background: var(--surface); }
    .rank  { color: var(--muted); width: 36px; text-align: right; }
    .owner { font-weight: 600; }
    .site  { color: var(--blue); text-decoration: none; font-size: 12px; }
    .site:hover { text-decoration: underline; }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 99px; padding: 2px 8px;
      font-size: 11px; font-weight: 600;
    }
    .pill.pass { background: #1c3a2a; color: var(--green); }
    .pill.fail { background: #3a1c1c; color: var(--red); }
    .pill.na   { background: #1e2228; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .latency { font-size: 12px; font-variant-numeric: tabular-nums; }
    .latency.fast   { color: var(--green); }
    .latency.medium { color: var(--yellow); }
    .latency.slow   { color: var(--red); }
    .latency.na     { color: var(--muted); }
    .errors { max-width: 260px; white-space: normal; color: var(--red); font-size: 11px; }

    .loading, .empty { text-align: center; padding: 60px 24px; color: var(--muted); }

    footer {
      padding: 14px 24px; color: var(--muted); font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <img src="/images/logo-256.png" alt="infinitybloc" height="28" onerror="this.style.display='none'" />
  <h1>Telos BP Validator</h1>
  <div class="meta" id="meta">Loading…</div>
</header>

<div class="stats" id="stats"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('perf',this)">📈 CPU Performance</div>
  <div class="tab"        onclick="showTab('table',this)">📋 Producer Table</div>
</div>

<!-- ══ Performance Chart ═══════════════════════════════════════════════════ -->
<div class="panel active" id="panel-perf">
  <div class="perf-panel">
    <div class="perf-toolbar">
      <button class="btn primary" onclick="showTab('table', document.querySelectorAll('.tab')[1])">VIEW TABLE</button>
      <span class="perf-title" id="chartTitle">Telos Validator API Performance</span>
      <div style="display:flex;gap:6px">
        <button class="btn active-mode" id="btnApi"     onclick="setChartMode('api')"    style="background:#1f6feb;border-color:#1f6feb">API Latency</button>
        <button class="btn"             id="btnMissed"  onclick="setChartMode('missed')">Missed Blocks</button>
      </div>
    </div>

    <div class="chart-wrap">
      <div id="chartArea">
        <div class="chart-canvas-wrap">
          <canvas id="perfChart"></canvas>
        </div>
        <div class="bp-legend" id="bpLegend"></div>
        <div class="legend-controls">
          <button class="btn" onclick="selectAll(true)">SELECT ALL</button>
          <button class="btn" onclick="selectAll(false)">DESELECT ALL</button>
        </div>
      </div>
      <div id="chartNotice" class="notice" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ══ Table ════════════════════════════════════════════════════════════════ -->
<div class="panel" id="panel-table">
  <div class="controls">
    <input type="search" id="search" placeholder="Search producer…" oninput="renderTable()" />
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn"        onclick="setFilter('passing',this)">Passing</button>
    <button class="filter-btn"        onclick="setFilter('failing',this)">Failing</button>
    <button class="filter-btn"        onclick="setFilter('testnet',this)">Testnet ✓</button>
    <button class="filter-btn"        onclick="setFilter('active',this)">Active ●</button>
    <button class="filter-btn"        onclick="setFilter('standby',this)">Standby ○</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th onclick="sort('scheduleType',this)">Type</th>
          <th onclick="sort('owner',this)">Producer</th>
          <th onclick="sort('sslVerified',this)">SSL</th>
          <th onclick="sort('apiVerified',this)">API</th>
          <th onclick="sort('apiResponseMs',this)">Latency</th>
          <th onclick="sort('sslVerifiedTestNet',this)">Testnet SSL</th>
          <th onclick="sort('apiVerifiedTestNet',this)">Testnet API</th>
          <th onclick="sort('apiResponseMsTestNet',this)">Testnet ms</th>
          <th>Errors</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  Active schedule BPs only · Refreshed every 6 hours via GitHub Actions ·
  <a href="https://infinitybloc.io">infinitybloc</a> ·
  <a href="/validation/latest.json">JSON</a>
</footer>

<script>
/* ── Palette ── */
const PALETTE = [
  '#58a6ff','#3fb950','#f85149','#d29922','#bc8cff',
  '#ff7b72','#79c0ff','#56d364','#ffa657','#f0883e',
  '#e3b341','#a5d6ff','#85e89d','#ff9bce','#d2a8ff',
  '#ffa198','#b3d9ff','#06d6a0','#ef476f','#ffd166',
  '#00b4d8','#cae8ff','#118ab2','#7ee787','#ffb8c2',
];

/* ── State ── */
let producers    = [];
let historyRuns  = [];
let perfChart    = null;
let hiddenBPs    = new Set();
let sortKey      = null;
let sortAsc      = true;
let currentFilter = 'all';

/* ── Helpers ── */
function fmtTime(isoStr) {
  const d = new Date(isoStr);
  const mo = d.toLocaleString('en', { month: 'short', day: 'numeric' });
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${mo} ${hh}:${mm}`;
}

/* ── Tabs ── */
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ── Load ── */
async function load() {
  let latest, hist;

  /* Fetch both files; let history silently fail */
  try {
    const r = await fetch('/validation/latest.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    latest = await r.json();
  } catch(e) {
    document.getElementById('meta').textContent = 'Error loading data: ' + e.message;
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="9" class="empty">Failed to load: ${e.message}</td></tr>`;
    return;
  }

  try {
    const r = await fetch('/validation/history.json');
    if (r.ok) hist = await r.json();
  } catch(_) {}

  producers   = latest.producers || [];
  historyRuns = (hist && hist.runs) ? hist.runs : [];

  if (!producers.length) {
    document.getElementById('meta').textContent = 'No data yet — first validation run pending.';
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="9" class="empty">Waiting for first run…</td></tr>';
    return;
  }

  const d = new Date(latest.generatedAt);
  document.getElementById('meta').textContent =
    `Updated ${d.toLocaleString()} · ${producers.length} active BPs`;

  buildStats();
  buildChart();   /* isolated — won't crash the rest of the page */
  renderTable();
}

/* ── Stats ── */
function buildStats() {
  const total   = producers.length;
  const passing = producers.filter(p => p.sslVerified && p.apiVerified).length;
  const tnOk    = producers.filter(p => p.sslVerifiedTestNet && p.apiVerifiedTestNet).length;
  const msArr   = producers.filter(p => p.apiVerified && p.apiResponseMs > 0).map(p => p.apiResponseMs);
  const avgMs   = msArr.length ? Math.round(msArr.reduce((a,b)=>a+b,0)/msArr.length) : null;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="value">${total}</span><span class="label">Registered BPs</span></div>
    <div class="stat"><span class="value green">${passing}</span><span class="label">Mainnet Passing</span></div>
    <div class="stat"><span class="value red">${total - passing}</span><span class="label">Mainnet Failing</span></div>
    <div class="stat"><span class="value">${tnOk}</span><span class="label">Testnet Passing</span></div>
    ${avgMs !== null ? `<div class="stat"><span class="value blue">${avgMs} ms</span><span class="label">Avg Latency</span></div>` : ''}
  `;
}

/* ── Chart mode ── */
let chartMode = 'api';   // 'api' | 'missed'

function setChartMode(mode) {
  chartMode = mode;
  document.getElementById('btnApi').style.background    = mode === 'api'    ? '#1f6feb' : '#21262d';
  document.getElementById('btnApi').style.borderColor   = mode === 'api'    ? '#1f6feb' : '#30363d';
  document.getElementById('btnMissed').style.background = mode === 'missed' ? '#1f6feb' : '#21262d';
  document.getElementById('btnMissed').style.borderColor= mode === 'missed' ? '#1f6feb' : '#30363d';
  document.getElementById('chartTitle').textContent = mode === 'api'
    ? 'Telos Validator API Performance'
    : 'Missed Blocks per Rotation';
  buildChart();
}

/* ── Chart ── */
function buildChart() {
  try {
    if (historyRuns.length < 2) {
      /* Not enough history yet — show a placeholder */
      document.getElementById('chartArea').style.display   = 'none';
      document.getElementById('chartNotice').style.display = 'block';
      document.getElementById('chartNotice').innerHTML = `
        <strong style="color:var(--text)">Chart will appear after a few runs</strong><br><br>
        The service runs every 6 hours via GitHub Actions.<br>
        ${historyRuns.length === 1
          ? 'First data point recorded — one more run needed to draw lines.'
          : 'Trigger a manual run from GitHub Actions to start collecting data.'}
        <br><br>
        <strong style="color:var(--text)">Current snapshot: ${producers.filter(p=>p.apiVerified).length} / ${producers.length} BPs responding</strong>
      `;
      return;
    }

    /* Build labels from run timestamps */
    const labels = historyRuns.map(r => fmtTime(r.t));

    /* Collect all BP names across all runs */
    const bpNames = Array.from(new Set(
      historyRuns.flatMap(r => Object.keys(r.bps || {}))
    )).sort();

    const isMissed = chartMode === 'missed';

    const datasets = bpNames.map((name, i) => {
      const color = PALETTE[i % PALETTE.length];
      const data  = isMissed
        ? historyRuns.map(r => r.missed && r.missed[name] != null ? r.missed[name] : null)
        : historyRuns.map(r => r.bps[name] != null ? r.bps[name] : null);
      return {
        label:            name,
        data,
        borderColor:      color,
        backgroundColor:  color,
        borderWidth:      1.5,
        pointRadius:      2.5,
        pointHoverRadius: 5,
        tension:          0.3,
        spanGaps:         true,
        hidden:           hiddenBPs.has(name),
      };
    });

    const ctx = document.getElementById('perfChart').getContext('2d');
    if (perfChart) perfChart.destroy();

    perfChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2128',
            borderColor:     '#30363d',
            borderWidth:     1,
            titleColor:      '#e6edf3',
            bodyColor:       '#8b949e',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.raw !== null ? ctx.raw + (chartMode === 'api' ? ' ms' : ' missed') : '—'}`,
            },
          },
        },
        scales: {
          x: {
            grid:  { color: '#21262d' },
            ticks: {
              color: '#8b949e',
              maxTicksLimit: 12,
              font: { size: 11 },
              maxRotation: 45,
            },
          },
          y: {
            beginAtZero: true,
            grid:  { color: '#21262d' },
            ticks: { color: '#8b949e', font: { size: 11 } },
            title: { display: true, text: chartMode === 'api' ? 'milliseconds' : 'blocks missed', color: '#8b949e', font: { size: 11 } },
          },
        },
        animation: { duration: 400 },
      },
    });

    /* Custom legend */
    document.getElementById('bpLegend').innerHTML = bpNames.map((name, i) => {
      const color  = PALETTE[i % PALETTE.length];
      const hidden = hiddenBPs.has(name);
      return `<div class="legend-item${hidden?' hidden':''}" onclick="toggleBP('${name}',this)" data-bp="${name}">
        <span class="legend-line" style="background:${color}"></span>
        ${name}
      </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('chartArea').style.display   = 'none';
    document.getElementById('chartNotice').style.display = 'block';
    document.getElementById('chartNotice').textContent   = 'Chart error: ' + e.message;
    console.error('Chart build error:', e);
  }
}

function toggleBP(name, el) {
  const ds = perfChart && perfChart.data.datasets.find(d => d.label === name);
  if (!ds) return;
  if (hiddenBPs.has(name)) { hiddenBPs.delete(name); ds.hidden = false; el.classList.remove('hidden'); }
  else                     { hiddenBPs.add(name);    ds.hidden = true;  el.classList.add('hidden'); }
  perfChart.update();
}

function selectAll(visible) {
  if (!perfChart) return;
  hiddenBPs.clear();
  perfChart.data.datasets.forEach(ds => {
    ds.hidden = !visible;
    if (!visible) hiddenBPs.add(ds.label);
  });
  document.querySelectorAll('.legend-item').forEach(el =>
    el.classList.toggle('hidden', !visible));
  perfChart.update();
}

/* ── Table ── */
function pill(val, naLabel) {
  if (val === null || val === undefined)
    return `<span class="pill na"><span class="dot"></span>${naLabel??'N/A'}</span>`;
  return val
    ? `<span class="pill pass"><span class="dot"></span>Pass</span>`
    : `<span class="pill fail"><span class="dot"></span>Fail</span>`;
}
function latencyBadge(ms) {
  if (ms == null || ms < 0) return `<span class="latency na">—</span>`;
  const cls = ms < 300 ? 'fast' : ms < 800 ? 'medium' : 'slow';
  return `<span class="latency ${cls}">${ms} ms</span>`;
}
function hasTestnet(p) {
  return p.sslVerifiedTestNet || p.apiVerifiedTestNet ||
    (p.validationErrors||[]).some(e => /testnet/i.test(e));
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function sort(key, th) {
  sortAsc = sortKey === key ? !sortAsc : true;
  sortKey = key;
  document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
  th.classList.add('sorted');
  renderTable();
}
function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = producers.filter(p => {
    if (q && !p.owner.toLowerCase().includes(q)) return false;
    if (currentFilter === 'passing') return  p.sslVerified && p.apiVerified;
    if (currentFilter === 'failing') return !p.sslVerified || !p.apiVerified;
    if (currentFilter === 'testnet')  return  p.sslVerifiedTestNet && p.apiVerifiedTestNet;
    if (currentFilter === 'active')   return  p.scheduleType === 'active';
    if (currentFilter === 'standby')  return  p.scheduleType === 'standby';
    return true;
  });
  if (sortKey) {
    rows = [...rows].sort((a,b) => {
      const av=a[sortKey], bv=b[sortKey];
      const cmp = typeof av==='boolean' ? (av===bv?0:av?-1:1)
                : typeof av==='number'  ? av-bv
                : String(av).localeCompare(String(bv));
      return sortAsc ? cmp : -cmp;
    });
  }
  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="10" class="empty">No producers match.</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = rows.map((p,i) => {
    const org  = p.org||{};
    const site = (org.website||p.url||'').trim();
    const cc   = org.location?.country??'';
    const errs = (p.validationErrors||[]).join(' · ');
    const ht   = hasTestnet(p);
    const typeBadge = p.scheduleType === 'active'
      ? '<span style="display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600;background:#1c3a2a;color:#3fb950">ACTIVE</span>'
      : '<span style="display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600;background:#21262d;color:#8b949e">STANDBY</span>';
    return `<tr>
      <td class="rank">${i+1}</td>
      <td>${typeBadge}</td>
      <td>
        <span class="owner">${p.owner}</span>
        ${cc?`<span style="margin-left:6px;font-size:11px;color:var(--muted)">${cc}</span>`:''}
        ${site?`<br><a class="site" href="${site}" target="_blank" rel="noopener">${site.replace(/^https?:\/\//,'')}</a>`:''}
      </td>
      <td>${pill(p.sslVerified)}</td>
      <td>${pill(p.apiVerified)}</td>
      <td>${latencyBadge(p.apiResponseMs)}</td>
      <td>${ht?pill(p.sslVerifiedTestNet):pill(null,'None')}</td>
      <td>${ht?pill(p.apiVerifiedTestNet):pill(null,'None')}</td>
      <td>${ht&&p.apiVerifiedTestNet?latencyBadge(p.apiResponseMsTestNet):'<span class="latency na">—</span>'}</td>
      <td class="errors">${errs}</td>
    </tr>`;
  }).join('');
}

load();
</script>
</body>
